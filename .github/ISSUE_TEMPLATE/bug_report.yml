name: Bug report
description: Report a detection, runtime, packaging, or benchmark problem
title: "Bug: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: commands
    attributes:
      label: Command or menu action
      description: What did you run or select?
      render: powershell
  - type: textarea
    id: output
    attributes:
      label: Output
      description: Paste the relevant terminal output.
      render: text
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "Windows 11"
